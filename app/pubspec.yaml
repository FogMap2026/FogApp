name: fogapp
description: "FogApp — 안개 지도 탐험형 여행 플랫폼"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 지도 (Naver Maps)
  flutter_naver_map: ^1.3.0

  # 위치 / GPS
  geolocator: ^12.0.0
  geocoding: ^5.0.0

  # 카메라 / 사진 인증
  camera: ^0.11.0
  image_picker: ^1.1.2

  # 네트워크
  dio: ^5.5.0

  # Firebase (Auth / Firestore / Storage / Messaging)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
