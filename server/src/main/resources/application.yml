server:
  port: 8080

spring:
  application:
    name: fogapp-server
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fogapp}
    username: ${DB_USERNAME:fogapp}
    password: ${DB_PASSWORD:fogapp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마는 Flyway가 소유한다. Hibernate는 엔티티-스키마 일치만 검증.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 외부 API 키 (환경 변수로 주입, .env 참고)
tour:
  api:
    service-key: ${TOUR_API_SERVICE_KEY:}
