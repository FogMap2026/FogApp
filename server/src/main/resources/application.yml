server:
  port: 8080

spring:
  application:
    name: fogapp-server
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fogapp}
    username: ${DB_USERNAME:fogapp}
    password: ${DB_PASSWORD:fogapp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 스키마는 Flyway가 소유한다. Hibernate는 엔티티-스키마 일치만 검증.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 한국관광공사 TourAPI (스팟 수집 #5). 서비스 키는 환경 변수로 주입(.env 참고).
tour:
  api:
    service-key: ${TOUR_API_SERVICE_KEY:}
    base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService1}
    mobile-app: FogApp
    mobile-os: ETC
  # 수집 배치 설정. on-startup=true 로 켜면 기동 시 지정 지역을 수집한다(기본 off).
  collect:
    on-startup: ${TOUR_COLLECT_ON_STARTUP:false}
    area-codes: ${TOUR_COLLECT_AREA_CODES:1,6,39}
    num-of-rows: 100
    max-pages: 10

# Firebase (ID 토큰 검증) — 기본 비활성. 실제 배포/연동 시 FIREBASE_ENABLED=true 로 켠다.
# 자격증명은 서비스 계정 JSON 경로(FIREBASE_SERVICE_ACCOUNT_PATH) 또는 GOOGLE_APPLICATION_CREDENTIALS 사용.
firebase:
  enabled: ${FIREBASE_ENABLED:false}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
