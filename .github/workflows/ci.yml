name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# 변경된 영역만 검사 (app / server)
jobs:
  app:
    name: Flutter App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 플랫폼 폴더가 아직 없으므로 생성 (lib/ 는 유지)
      - name: Generate platform folders
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  server:
    name: Spring Boot Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build --no-daemon
